<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form - Micro Project</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    
    <script src="https://login2explore.com/jpdb/resources/js/0.0.4/jpdb-commons.js"></script>
</head>
<body>
    <div class="container mt-5" style="margin-top: 30px;">
        <div class="panel panel-primary">
            <div class="panel-heading text-center">
                <h3>Student Enrollment Form</h3>
            </div>
            <div class="panel-body">
                <form id="studentForm">
                    
                    <div class="form-group">
                        <label for="rollNo">Roll No. (Primary Key):</label>
                        <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll Number" required onblur="getStudent()">
                    </div>
                    
                    <div class="form-group">
                        <label for="fullName">Full Name:</label>
                        <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="className">Class:</label>
                        <input type="text" class="form-control" id="className" placeholder="Enter Class (e.g., 10th)" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthDate">Birth Date:</label>
                        <input type="date" class="form-control" id="birthDate" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="address">Address:</label>
                        <input type="text" class="form-control" id="address" placeholder="Enter Address" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="enrollDate">Enrollment Date:</label>
                        <input type="date" class="form-control" id="enrollDate" disabled>
                    </div>

                    <div class="form-group text-center" style="margin-top: 20px;">
                        <button type="button" class="btn btn-success" id="saveBtn" disabled onclick="saveData()">Save</button>
                        <button type="button" class="btn btn-primary" id="updateBtn" disabled onclick="updateData()">Update</button>
                        <button type="button" class="btn btn-danger" id="resetBtn" disabled onclick="resetForm()">Reset</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>

    <script>
        var connToken = "90935078|-31949247873253494|90904009"; 
        
        var dbName = "SCHOOL-DB";
        var relName = "STUDENT-TABLE";
        var jpdbBaseURL = "http://api.login2explore.com:5577";
        var jpdbIRL = "/api/irl";
        var jpdbIML = "/api/iml";

        $(document).ready(function() {
            $("#rollNo").focus();
        });

        function resetForm() {
            $("#rollNo").val("").prop("disabled", false);
            $("#fullName").val("").prop("disabled", true);
            $("#className").val("").prop("disabled", true);
            $("#birthDate").val("").prop("disabled", true);
            $("#address").val("").prop("disabled", true);
            $("#enrollDate").val("").prop("disabled", true);
            
            $("#saveBtn").prop("disabled", true);
            $("#updateBtn").prop("disabled", true);
            $("#resetBtn").prop("disabled", true);
            
            $("#rollNo").focus();
        }

        function validateAndGetFormData() {
            var rollNo = $("#rollNo").val();
            if (rollNo === "") {
                alert("Roll Number is required");
                $("#rollNo").focus();
                return "";
            }
            var fullName = $("#fullName").val();
            if (fullName === "") {
                alert("Full Name is required");
                $("#fullName").focus();
                return "";
            }
            var className = $("#className").val();
            if (className === "") {
                alert("Class is required");
                $("#className").focus();
                return "";
            }
            var birthDate = $("#birthDate").val();
            if (birthDate === "") {
                alert("Birth Date is required");
                $("#birthDate").focus();
                return "";
            }
            var address = $("#address").val();
            if (address === "") {
                alert("Address is required");
                $("#address").focus();
                return "";
            }
            var enrollDate = $("#enrollDate").val();
            if (enrollDate === "") {
                alert("Enrollment Date is required");
                $("#enrollDate").focus();
                return "";
            }
            
            var jsonStrObj = {
                rollNo: rollNo,
                fullName: fullName,
                className: className,
                birthDate: birthDate,
                address: address,
                enrollDate: enrollDate
            };
            return JSON.stringify(jsonStrObj);
        }

        function getStudent() {
            var rollNo = $("#rollNo").val();
            if (rollNo === "") {
                return;
            }

            var getReqStr = createGET_BY_KEYRequest(connToken, dbName, relName, JSON.stringify({rollNo: rollNo}));
            jQuery.ajaxSetup({async: false});
            var resultObj = executeCommandAtGivenBaseUrl(getReqStr, jpdbBaseURL, jpdbIRL);
            jQuery.ajaxSetup({async: true});

            if (resultObj.status === 400) {
                // Roll No. nahi mila (Naya Student)
                $("#saveBtn").prop("disabled", false);
                $("#resetBtn").prop("disabled", false);
                
                $("#fullName").prop("disabled", false).focus();
                $("#className").prop("disabled", false);
                $("#birthDate").prop("disabled", false);
                $("#address").prop("disabled", false);
                $("#enrollDate").prop("disabled", false);
            } 
            else if (resultObj.status === 200) {
                // Roll No. mil gaya (Puraana Student)
                $("#rollNo").prop("disabled", true);
                
                var data = JSON.parse(resultObj.data).record;
                $("#fullName").val(data.fullName).prop("disabled", false).focus();
                $("#className").val(data.className).prop("disabled", false);
                $("#birthDate").val(data.birthDate).prop("disabled", false);
                $("#address").val(data.address).prop("disabled", false);
                $("#enrollDate").val(data.enrollDate).prop("disabled", false);
                
                localStorage.setItem("rec_no", JSON.parse(resultObj.data).rec_no);
                
                $("#updateBtn").prop("disabled", false);
                $("#resetBtn").prop("disabled", false);
            }
        }

        function saveData() {
            var jsonStr = validateAndGetFormData();
            if (jsonStr === "") { return; }
            
            var putReqStr = createPUTRequest(connToken, jsonStr, dbName, relName);
            jQuery.ajaxSetup({async: false});
            var resultObj = executeCommandAtGivenBaseUrl(putReqStr, jpdbBaseURL, jpdbIML);
            jQuery.ajaxSetup({async: true});
            
            alert("Data saved successfully!");
            resetForm();
        }

        function updateData() {
            var jsonStr = validateAndGetFormData();
            if (jsonStr === "") { return; }
            
            var updateReqStr = createUPDATERecordRequest(connToken, jsonStr, dbName, relName, localStorage.getItem("rec_no"));
            jQuery.ajaxSetup({async: false});
            var resultObj = executeCommandAtGivenBaseUrl(updateReqStr, jpdbBaseURL, jpdbIML);
            jQuery.ajaxSetup({async: true});
            
            alert("Data updated successfully!");
            resetForm();
        }
    </script>
</body>
</html>
